<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostClaw</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#a78bfa">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo">🐾 GhostClaw</span>
      <div class="agent-select-wrap">
        <select id="agent-select" title="Select agent"></select>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="chat">Chat</button>
      <button class="tab" data-tab="sessions">Sessions</button>
      <button class="tab" data-tab="memories">Memories</button>
      <button class="tab" data-tab="skills">Skills</button>
      <button class="tab" data-tab="connectors">Connectors</button>
    </nav>
    <button id="btn-settings" class="secondary icon-btn" title="Configure GhostClaw">⚙</button>
  </header>

  <main>
    <!-- Chat panel -->
    <div id="panel-chat" class="panel active">
      <div id="messages" role="log" aria-live="polite"></div>
    </div>

    <!-- Sessions panel -->
    <div id="panel-sessions" class="panel">
      <div class="panel-toolbar">
        <button id="btn-refresh-sessions">Refresh</button>
      </div>
      <div id="sessions-list" class="item-list"></div>
    </div>

    <!-- Skills panel -->
    <div id="panel-skills" class="panel">
      <div class="panel-toolbar">
        <span id="skill-dir-badge" class="skill-dir-badge"></span>
        <button id="btn-refresh-skills" class="secondary">Refresh</button>
      </div>
      <div id="skills-content" class="skills-content"></div>
    </div>

    <!-- Connectors panel -->
    <div id="panel-connectors" class="panel">
      <!-- content rendered by renderConnectorsPanel() in app.js -->
    </div>

    <!-- Memories panel -->
    <div id="panel-memories" class="panel">
      <div class="panel-toolbar">
        <input id="memory-search" type="text" placeholder="Search memories…" autocomplete="off">
        <button id="btn-search-memories">Search</button>
        <button id="btn-refresh-memories">All</button>
      </div>
      <div id="memories-list" class="item-list"></div>
    </div>
  </main>

  <footer>
    <div class="input-row">
      <textarea id="input" placeholder="Message…" rows="1" autocomplete="off"></textarea>
      <button id="btn-send" disabled>Send</button>
      <button id="btn-new-session">New</button>
    </div>
    <div class="status-row">
      <span id="session-label">session: —</span>
      <span id="conn-status" class="dot disconnected" title="Disconnected"></span>
      <span id="token-stats"></span>
    </div>
  </footer>

  <!-- ── Setup Wizard Modal ─────────────────────────────────────────────── -->
  <div id="wizard-overlay" class="wizard-overlay hidden" role="dialog" aria-modal="true" aria-label="GhostClaw Setup">
    <div class="wizard-card">

      <div class="wizard-header">
        <span class="logo">🐾 GhostClaw Setup</span>
        <div class="wizard-progress" id="wizard-progress">
          <!-- dots injected by JS -->
        </div>
      </div>

      <div class="wizard-body" id="wizard-body">
        <!-- content injected per-step by JS -->
      </div>

      <div class="wizard-footer">
        <button id="wbtn-skip" class="secondary" style="display:none">Skip for now</button>
        <div style="flex:1"></div>
        <button id="wbtn-back" class="secondary" style="display:none">← Back</button>
        <button id="wbtn-next">Next →</button>
        <button id="wbtn-save" style="display:none">💾 Save Configuration</button>
      </div>

    </div>
  </div>

  <script src="/app.js"></script>
  <script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
