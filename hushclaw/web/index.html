<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HushClaw</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5aa9e6">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <script>
    (function() {
      try {
        var mode = localStorage.getItem("hushclaw.ui.theme-mode") || "auto";
        if (!["auto", "light", "dark"].includes(mode)) mode = "auto";
        var resolved = mode === "auto"
          ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : mode;
        document.documentElement.dataset.themeMode = mode;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.style.colorScheme = resolved;
      } catch (_e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/styles/theme-modes.css">
  <link rel="stylesheet" href="/styles/chat-theme.css">
  <link rel="stylesheet" href="/styles/markdown-tight.css">
  <link rel="stylesheet" href="/styles/ui-theme-unified.css">
</head>
<body>
  <header>
    <span class="logo">HushClaw</span>
    <nav class="tabs">
      <button class="tab active" data-tab="chat">Chat</button>
      <button class="tab" data-tab="agents">Agents</button>
      <button class="tab" data-tab="memories">Memories</button>
      <button class="tab" data-tab="skills">Skills</button>
      <button class="tab" data-tab="tasks">Tasks</button>
    </nav>
    <div class="header-right">
      <div class="agent-select-wrap">
        <select id="agent-select" title="Select agent"></select>
      </div>
      <button id="btn-settings" class="icon-btn" title="Settings">⚙</button>
    </div>
  </header>

  <main>
    <!-- Chat panel (left: sessions sidebar, right: chat area) -->
    <div id="panel-chat" class="panel active">
      <div id="sessions-sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Sessions</span>
          <div class="sidebar-actions">
            <button id="btn-toggle-sessions" class="muted-btn small" title="Collapse sessions">⟨</button>
            <button id="btn-refresh-sessions" class="muted-btn small" title="Refresh">↺</button>
          </div>
        </div>
        <div id="sessions-list"></div>
      </div>
      <div id="chat-area">
        <button id="btn-toggle-sessions-inline" class="muted-btn small hidden" title="Show sessions">☰</button>
        <div id="messages" role="log" aria-live="polite"></div>
      </div>
    </div>

    <!-- Agents panel -->
    <div id="panel-agents" class="panel">
      <div class="panel-toolbar">
        <button id="btn-refresh-agents" class="secondary">Refresh</button>
        <button id="btn-add-agent" class="secondary">+ New Agent</button>
      </div>
      <div id="agents-list" class="item-list"></div>
    </div>

    <!-- Skills panel -->
    <div id="panel-skills" class="panel">
      <div class="panel-toolbar">
        <span id="skill-dir-badge" class="skill-dir-badge"></span>
        <button id="btn-refresh-skills" class="secondary">Refresh</button>
      </div>
      <div id="skills-content" class="skills-content"></div>
    </div>

    <!-- Memories panel -->
    <div id="panel-memories" class="panel">
      <div class="panel-toolbar">
        <input id="memory-search" type="text" placeholder="Search memories…" autocomplete="off">
        <button id="btn-search-memories">Search</button>
        <button id="btn-refresh-memories" class="secondary">All</button>
      </div>
      <div id="memories-list" class="item-list"></div>
    </div>

    <!-- Tasks panel -->
    <div id="panel-tasks" class="panel">
      <!-- Todos section -->
      <div class="tasks-section">
        <div class="tasks-section-header">
          <span class="tasks-section-title">Todos</span>
          <button id="btn-add-todo" class="muted-btn small" title="Manually add a todo">+ Add</button>
        </div>
        <div id="todo-add-row" class="todo-add-row hidden">
          <input id="todo-title-input" type="text" placeholder="Todo title…" autocomplete="off">
          <button id="todo-priority-btn" class="icon-btn secondary" title="Toggle priority">!</button>
          <input id="todo-due-input" type="date" title="Due date">
          <button id="btn-todo-submit">Add</button>
          <button id="btn-todo-cancel" class="secondary">✕</button>
        </div>
        <div id="todos-list" class="todos-list"></div>
      </div>

      <!-- Scheduled Tasks section -->
      <div class="tasks-section">
        <div class="tasks-section-header">
          <span class="tasks-section-title">Scheduled Tasks</span>
          <button id="btn-add-scheduled" class="muted-btn small" title="Manually schedule a task">+ Schedule</button>
        </div>
        <div id="sched-add-row" class="sched-add-row hidden">
          <div class="sched-mode-toggle">
            <label><input type="radio" name="sched-mode" value="simple" checked> Simple</label>
            <label><input type="radio" name="sched-mode" value="cron"> Cron</label>
          </div>
          <div id="sched-simple-inputs" class="sched-simple-inputs">
            <select id="sched-freq">
              <option value="hourly">Every hour</option>
              <option value="daily" selected>Every day</option>
              <option value="weekly">Every week (Mon)</option>
            </select>
            <input id="sched-time" type="time" value="09:00">
          </div>
          <div id="sched-cron-input" class="hidden">
            <input id="sched-cron-expr" type="text" placeholder="cron expr: 0 9 * * *" autocomplete="off">
          </div>
          <input id="sched-title-input" type="text" placeholder="Task name…" autocomplete="off">
          <textarea id="sched-prompt-input" placeholder="Prompt / task description…" rows="2"></textarea>
          <div class="sched-add-footer">
            <select id="sched-agent-select" title="Agent"></select>
            <label class="sched-once-label"><input type="checkbox" id="sched-run-once"> Run once</label>
            <button id="btn-sched-submit">Schedule</button>
            <button id="btn-sched-cancel" class="secondary">✕</button>
          </div>
        </div>
        <div id="scheduled-list" class="scheduled-list"></div>
      </div>
    </div>
  </main>

  <footer>
    <div id="handover-banner" class="handover-banner hidden">
      <span id="handover-msg">🔐 Browser opened — complete your action, then click Done</span>
      <button id="btn-handover-done" class="secondary">✓ Done</button>
    </div>
    <div id="attachment-chips" class="attachment-chips hidden"></div>
    <div class="input-wrap">
      <textarea id="input" placeholder="Message…" rows="1" autocomplete="off"></textarea>
      <div class="input-toolbar">
        <input type="file" id="file-input" multiple style="display:none">
        <button id="btn-attach" title="Attach file" tabindex="-1">📎</button>
        <span id="session-label" class="session-label">session: —</span>
        <span id="conn-status" class="dot disconnected" title="Disconnected"></span>
        <span id="token-stats" class="token-stats"></span>
        <div class="input-actions">
          <button id="btn-new-session" class="ghost-btn" title="Start a new session when switching topic">+ new topic</button>
          <button id="btn-stop" class="stop-btn hidden">■</button>
          <button id="btn-send" disabled class="send-btn">↑</button>
        </div>
      </div>
    </div>
  </footer>

  <!-- ── Settings Modal ──────────────────────────────────────────────────── -->
  <div id="wizard-overlay" class="wizard-overlay hidden" role="dialog" aria-modal="true" aria-label="HushClaw Settings">
    <div class="wizard-card">

      <div class="wizard-header">
        <span class="wizard-title">Settings</span>
        <button id="wbtn-close" class="icon-btn" style="display:none">✕</button>
      </div>

      <div class="wizard-layout">
        <nav class="wizard-nav" id="settings-tabs">
          <!-- tab buttons injected by JS -->
        </nav>
        <div class="wizard-body" id="wizard-body">
          <!-- content injected per-tab by JS -->
        </div>
      </div>

      <div class="wizard-footer">
        <span id="wstatus" class="wstatus"></span>
        <button id="wbtn-save">💾 Save</button>
      </div>

    </div>
  </div>

  <script type="module" src="/app.js"></script>
  <script>
if ("serviceWorker" in navigator) {
  let reloadPendingByUserConfirm = false;
  let updatePromptShown = false;

  function askForUpdate(reg) {
    if (!reg || !reg.waiting || updatePromptShown) return;
    updatePromptShown = true;
    const ok = window.confirm("发现新版本，是否立即更新界面？");
    if (ok) {
      reloadPendingByUserConfirm = true;
      reg.waiting.postMessage({ type: "SKIP_WAITING" });
    } else {
      updatePromptShown = false;
    }
  }

  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (!reloadPendingByUserConfirm) return;
    window.location.reload();
  });

  navigator.serviceWorker.register("/sw.js").then((reg) => {
    reg.update();
    setInterval(() => reg.update(), 60 * 1000);
    if (reg.waiting) askForUpdate(reg);
    reg.addEventListener("updatefound", () => {
      const next = reg.installing;
      if (!next) return;
      next.addEventListener("statechange", () => {
        if (next.state === "installed" && navigator.serviceWorker.controller) {
          askForUpdate(reg);
        }
      });
    });
  });
}
</script>
</body>
</html>
