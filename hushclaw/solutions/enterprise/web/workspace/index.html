<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HushClaw Enterprise</title>
  <link rel="stylesheet" href="/enterprise/enterprise-shell.css">
</head>
<body class="enterprise-workspace-shell">
  <aside class="enterprise-shell-rail">
    <div class="enterprise-shell-brand">
      <span>HC</span>
      <strong>Enterprise</strong>
    </div>
    <nav>
      <button class="active">Workbench</button>
      <button>Domains</button>
      <button>Knowledge</button>
      <button>Agents</button>
      <button>Tasks</button>
    </nav>
    <a class="enterprise-admin-link" href="/enterprise/admin">Admin</a>
  </aside>
  <main class="enterprise-shell-main">
    <section class="enterprise-shell-hero">
      <div>
        <span class="enterprise-shell-kicker">Enterprise Workspace</span>
        <h1>Agent workspace for business domains</h1>
        <p>Employees work through enabled domains, shared knowledge, agents, and governed actions. AgentOS stays behind this shell as the runtime layer.</p>
      </div>
      <div class="enterprise-shell-status" id="runtime-status">Connecting…</div>
    </section>
    <section class="enterprise-shell-grid" id="workspace-cards"></section>
  </main>
  <script type="module" src="/enterprise/enterprise-shell.js"></script>
</body>
</html>
