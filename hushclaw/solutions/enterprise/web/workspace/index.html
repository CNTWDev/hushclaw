<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HushClaw Enterprise</title>
  <link rel="stylesheet" href="/enterprise/enterprise-shell.css">
</head>
<body class="enterprise-workspace-shell">
  <aside class="enterprise-shell-rail">
    <div class="enterprise-shell-brand">
      <span>HC</span>
      <strong>Enterprise</strong>
    </div>
    <nav id="enterprise-workspace-nav"></nav>
    <a class="enterprise-admin-link" href="/enterprise/admin">Admin</a>
  </aside>
  <main class="enterprise-shell-main">
    <section class="enterprise-shell-hero">
      <div>
        <span class="enterprise-shell-kicker">Enterprise Workspace</span>
        <h1 id="workspace-title">Agent Workbench</h1>
        <p id="workspace-subtitle">Employees work through enabled domains, shared knowledge, agents, and governed actions.</p>
      </div>
      <div class="enterprise-shell-status" id="runtime-status">Connecting…</div>
    </section>
    <section id="workspace-content"></section>
  </main>
  <script type="module" src="/enterprise/enterprise-shell.js"></script>
</body>
</html>
