<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OPC</title>
  <link rel="stylesheet" href="/opc/opc-shell.css">
</head>
<body>
  <div class="opc-shell">
    <aside class="rail">
      <div class="org-block">
        <div class="org-mark">O</div>
        <div>
          <div class="org-name">OPC</div>
          <div class="org-subtitle">Operations console</div>
        </div>
      </div>

      <section class="rail-section">
        <button class="rail-item active" data-mode="chat">Inbox</button>
        <button class="rail-item" data-mode="goals">Goals</button>
        <button class="rail-item" data-mode="work">Tasks</button>
      </section>

      <section class="rail-section">
        <div class="section-title">
          <span>Channels</span>
          <button id="btn-refresh" title="Refresh">↻</button>
        </div>
        <div id="channel-list" class="channel-list"></div>
      </section>

      <section class="rail-section employees-section">
        <div class="section-title">
          <span>Digital Employees</span>
          <button id="btn-new-employee" title="New employee">+</button>
        </div>
        <div id="employee-list" class="employee-list"></div>
      </section>

      <div class="rail-footer">
        <span>OPC</span>
        <span id="conn-status">connecting</span>
      </div>
    </aside>

    <main class="chat-pane">
      <header class="channel-header">
        <div>
          <h1 id="channel-title">OPC</h1>
          <div class="channel-tabs">
            <button class="tab active" data-mode="chat">Chat</button>
            <button class="tab" data-mode="goals">Workspace</button>
          </div>
        </div>
        <div class="header-actions">
          <button id="btn-new-team" class="secondary">New Team</button>
          <button id="btn-new-goal" class="primary">New Goal</button>
        </div>
      </header>

      <section id="mode-chat" class="mode-panel active">
        <div id="message-list" class="message-list"></div>
        <form id="composer" class="composer">
          <button type="button" id="btn-mention-all" title="Mention all">+</button>
          <textarea id="composer-input" rows="1" placeholder="Message this team. Use @all or @agent-name to call digital employees."></textarea>
          <select id="goal-link" title="Link goal"></select>
          <button type="submit" class="send-btn">Send</button>
        </form>
      </section>

      <section id="mode-goals" class="mode-panel">
        <div class="workspace-grid">
          <section>
            <div class="panel-title">Goals</div>
            <div id="goal-list" class="stack"></div>
          </section>
          <section>
            <div class="panel-title">Work Items</div>
            <div id="work-list" class="stack"></div>
          </section>
        </div>
      </section>

      <section id="mode-work" class="mode-panel">
        <div class="panel-title">Approved Tasks</div>
        <div id="task-list" class="stack"></div>
      </section>
    </main>

    <aside class="context">
      <section class="context-card">
        <h2>Team</h2>
        <div id="team-context" class="context-body">No team selected.</div>
      </section>
      <section class="context-card">
        <h2>Linked Goal</h2>
        <div id="goal-context" class="context-body">No linked goal.</div>
      </section>
    </aside>
  </div>

  <dialog id="team-dialog">
    <form id="team-form" class="dialog-card">
      <h2 id="team-dialog-title">Create Team Channel</h2>
      <input type="hidden" name="team_id">
      <label>Team name<input name="name" required></label>
      <label>Purpose<input name="purpose"></label>
      <label>Facilitator<select name="facilitator"></select></label>
      <label>Members<select name="member_agents" multiple></select></label>
      <div class="dialog-actions">
        <button type="button" class="secondary" data-close-dialog>Cancel</button>
        <button class="primary" type="submit">Create</button>
      </div>
    </form>
  </dialog>

  <dialog id="goal-dialog">
    <form id="goal-form" class="dialog-card">
      <h2 id="goal-dialog-title">Create Goal</h2>
      <input type="hidden" name="goal_id">
      <label>Objective<input name="objective" required></label>
      <label>Success criteria<textarea name="success_criteria" rows="4"></textarea></label>
      <label>Team<select name="team_id"></select></label>
      <label>Priority<input name="priority" type="number" min="0" max="5" value="1"></label>
      <div class="dialog-actions">
        <button type="button" class="secondary" data-close-dialog>Cancel</button>
        <button class="primary" type="submit">Create</button>
      </div>
    </form>
  </dialog>

  <dialog id="employee-dialog">
    <form id="employee-form" class="dialog-card employee-dialog-card">
      <h2>Onboard Digital Employee</h2>
      <label>
        What should this employee do?
        <textarea name="requirement" rows="4" placeholder="Example: Create a digital employee for competitor research and market trend briefs." required></textarea>
      </label>
      <label>Team<select name="team_id"></select></label>
      <div id="employee-draft-preview" class="draft-preview">Describe the role, then generate a draft.</div>
      <div class="dialog-actions">
        <button type="button" class="secondary" data-close-dialog>Cancel</button>
        <button id="btn-generate-employee" class="secondary" type="submit">Generate Draft</button>
        <button id="btn-create-employee" class="primary" type="button" disabled>Create Employee</button>
      </div>
    </form>
  </dialog>

  <dialog id="employee-edit-dialog">
    <form id="employee-edit-form" class="dialog-card employee-dialog-card">
      <h2>Edit Digital Employee</h2>
      <input type="hidden" name="employee_id">
      <label>Display name<input name="display_name" required></label>
      <label>Role<input name="role"></label>
      <label>Description<textarea name="description" rows="3"></textarea></label>
      <label>Team<input name="team"></label>
      <label>Reports to<input name="reports_to"></label>
      <label>Capabilities<textarea name="capabilities" rows="3" placeholder="One per line or comma separated"></textarea></label>
      <div class="dialog-actions">
        <button type="button" class="secondary" data-close-dialog>Cancel</button>
        <button class="primary" type="submit">Save</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="/opc/opc-shell.js"></script>
</body>
</html>
